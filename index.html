<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kindergarten Explorer 🏫</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" data-state="playing">

  <!-- ── Scene (video + placeholder) ─────────────────────────────────── -->
  <div id="scene">

    <!-- Location photo (background during navigation) -->
    <img id="location-photo" src="" alt="" />

    <!-- Real video (shown when a .mp4 file is found) -->
    <video id="main-video" playsinline webkit-playsinline>
      <source id="video-source" src="" type="video/mp4">
    </video>

    <!-- Placeholder (animated kid, shown when no video file exists yet) -->
    <div id="placeholder">
      <div id="placeholder-bg"></div>
      <div id="kid-character">
        <div id="kid-face">👧</div>
      </div>
      <div id="speech-bubble">
        <p id="speech-text">Loading...</p>
      </div>
    </div>

    <!-- ── Navigation arrows — overlaid directly on the scene ── -->

    <!-- Forward: bottom-center -->
    <button class="nav-arrow" id="nav-forward" data-dir="forward">
      <span class="arrow-chevron">▲</span>
      <span class="arrow-room"></span>
    </button>

    <!-- Left: left side, vertically centered -->
    <button class="nav-arrow" id="nav-left" data-dir="left">
      <span class="arrow-chevron">◀</span>
      <span class="arrow-room"></span>
    </button>

    <!-- Right: right side, vertically centered -->
    <button class="nav-arrow" id="nav-right" data-dir="right">
      <span class="arrow-room"></span>
      <span class="arrow-chevron">▶</span>
    </button>

    <!-- Backward: top-center -->
    <button class="nav-arrow" id="nav-backward" data-dir="backward">
      <span class="arrow-room"></span>
      <span class="arrow-chevron">▼</span>
    </button>

    <!-- ── HUD: room title ── -->
    <div id="location-title">
      <span id="location-emoji">🚪</span>
      <span id="location-name-display">Entrance</span>
    </div>

    <!-- ── Controls (skip / replay) ── -->
    <div id="video-controls">
      <button id="skip-btn"   class="control-btn">Skip ⏭</button>
      <button id="replay-btn" class="control-btn">↺ Replay</button>
    </div>

  </div><!-- /scene -->

  <!-- ── Mini-map ────────────────────────────────────────────────────── -->
  <div id="mini-map">
    <svg id="map-svg" viewBox="0 0 300 310" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- ── Transition black overlay ──────────────────────────────────── -->
  <div id="transition-overlay"></div>

</div><!-- /app -->

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
